name: Clear CDN
on:
  workflow_call:
    inputs:
      version:
        type: string
      extension:
        type: string
  workflow_dispatch:
    inputs:
      version:
        type: string
      extension:
        type: string

jobs:
   clean-cdn:
      name: Clean CDN
      runs-on: ubuntu-latest

      steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        shell: bash
        run: pip install twine awscli

      - name: Download from staging bucket
        shell: bash
        env:
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
        run: |
          ./scripts/extension-upload-from-nighty.sh ${{inputs.extension}} ${{inputs.version}}
